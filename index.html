<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags -->
  <title>Route Posts — Connect, Share & Discover</title>
  <meta name="title" content="Route Posts — Connect, Share & Discover" />
  <meta name="description" content="Route Posts is a social platform where you can share posts, follow friends, discover communities, and stay connected. Join thousands of users on Route Posts." />
  <meta name="keywords" content="social media, social network, posts, community, follow, share, Route Posts, connect, friends" />
  <meta name="author" content="Route Academy" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://route-posts.vercel.app/" />

  <!-- Theme & Favicon -->
  <meta name="theme-color" content="#1f6fe5" />
  <meta name="color-scheme" content="light dark" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://route-posts.vercel.app/" />
  <meta property="og:title" content="Route Posts — Connect, Share & Discover" />
  <meta property="og:description" content="Route Posts is a social platform where you can share posts, follow friends, discover communities, and stay connected." />
  <meta property="og:image" content="https://route-posts.vercel.app/favicon.png" />
  <meta property="og:site_name" content="Route Posts" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://route-posts.vercel.app/" />
  <meta name="twitter:title" content="Route Posts — Connect, Share & Discover" />
  <meta name="twitter:description" content="Route Posts is a social platform where you can share posts, follow friends, discover communities, and stay connected." />
  <meta name="twitter:image" content="https://route-posts.vercel.app/favicon.png" />

  <!-- Performance Hints -->
  <link rel="preconnect" href="https://route-posts.routemisr.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://route-posts.routemisr.com" />

  <!-- Web App Manifest -->
  <link rel="manifest" href="/manifest.json" />
</head>

<body>
  <noscript>You need to enable JavaScript to run Route Posts.</noscript>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Route Posts",
      "url": "https://route-posts.vercel.app/",
      "description": "A social platform to connect, share posts, and discover communities.",
      "publisher": {
        "@type": "Organization",
        "name": "Route Academy",
        "url": "https://routeacademy.com"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://route-posts.vercel.app/Comunity?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
</body>

</html>
